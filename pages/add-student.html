<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Student</title>

<link rel="stylesheet" href="../admin-dashboard.css">
<link rel="stylesheet" href="add-student.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="dashboard-card" style="max-width:900px;margin:40px auto;">

<h2>
<i class="fas fa-user-graduate"></i>
Student Registration
</h2>

<form id="studentForm">

<input
type="text"
id="studentName"
placeholder="Student Name"
required>

<br><br>

<input
type="text"
id="admissionNo"
placeholder="Admission Number"
required>

<br><br>

<input
type="text"
id="studentClass"
placeholder="Class"
required>

<br><br>

<input
type="text"
id="section"
placeholder="Section"
required>

<br><br>

<input
type="email"
id="email"
placeholder="Student Email"
required>

<br><br>

<input
type="password"
id="password"
placeholder="Password"
required>

<br><br>

<input
type="text"
id="parentName"
placeholder="Parent Name">

<br><br>

<input
type="text"
id="mobile"
placeholder="Parent Mobile">

<br><br>

<button class="action-btn" type="submit">

Create Student

</button>

</form>

</div>


<script type="module" src="add-student.js"></script>

</body>
</html>
