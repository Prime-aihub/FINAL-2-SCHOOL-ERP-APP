<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Teacher Profile</title>

    <link rel="stylesheet" href="teacher-profile.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="header">

        <h1>
            <i class="fas fa-user-tie"></i>
            Teacher Profile
        </h1>

        <a href="teachers.html" class="backBtn">
            <i class="fas fa-arrow-left"></i>
            Back
        </a>

    </div>

    <div class="profileCard">

        <div class="avatar">

            <i class="fas fa-user-tie"></i>

        </div>

        <div class="profileGrid">

            <div class="item">
                <label>Teacher Name</label>
                <span id="teacherName"></span>
            </div>

            <div class="item">
                <label>Employee ID</label>
                <span id="employeeId"></span>
            </div>

            <div class="item">
                <label>Department</label>
                <span id="department"></span>
            </div>

            <div class="item">
                <label>Qualification</label>
                <span id="qualification"></span>
            </div>

            <div class="item">
                <label>Experience</label>
                <span id="experience"></span>
            </div>

            <div class="item">
                <label>Email</label>
                <span id="email"></span>
            </div>

            <div class="item">
                <label>Mobile</label>
                <span id="mobile"></span>
            </div>

            <div class="item">
                <label>Gender</label>
                <span id="gender"></span>
            </div>

            <div class="item">
                <label>Date of Joining</label>
                <span id="joiningDate"></span>
            </div>

            <div class="item full">

                <label>Address</label>

                <span id="address"></span>

            </div>

        </div>

    </div>

</div>

<script type="module" src="teacher-profile.js"></script>

</body>

</html>
