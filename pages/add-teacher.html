<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Teacher</title>

    <link rel="stylesheet" href="add-teacher.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>

<body>

    <div class="container">

        <div class="header">

            <h1><i class="fas fa-chalkboard-teacher"></i> Add Teacher</h1>

            <a href="teachers.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back
            </a>

        </div>

        <form id="teacherForm">

            <div class="form-grid">

                <div class="form-group">
                    <label>Teacher Name</label>
                    <input type="text" id="teacherName" required>
                </div>

                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" id="employeeId" required>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="department" required>
                </div>

                <div class="form-group">
                    <label>Qualification</label>
                    <input type="text" id="qualification" required>
                </div>

                <div class="form-group">
                    <label>Experience (Years)</label>
                    <input type="number" id="experience">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="mobile">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>

                    <select id="gender">

                        <option>Male</option>

                        <option>Female</option>

                        <option>Other</option>

                    </select>

                </div>

                <div class="form-group">
                    <label>Date of Joining</label>
                    <input type="date" id="joiningDate">
                </div>

                <div class="form-group full-width">
                    <label>Address</label>
                    <textarea id="address" rows="4"></textarea>
                </div>

            </div>

            <button type="submit" class="save-btn">

                <i class="fas fa-save"></i>

                Save Teacher

            </button>

        </form>

    </div>

    <script type="module" src="add-teacher.js"></script>

</body>

</html>
