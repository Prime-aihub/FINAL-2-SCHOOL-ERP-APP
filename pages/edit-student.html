<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Student</title>

<link rel="stylesheet" href="../admin-dashboard.css">
<link rel="stylesheet" href="edit-student.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="form-card">

<h2>
<i class="fas fa-user-edit"></i>
Edit Student
</h2>

<form id="editStudentForm">

<div class="grid">

<div>

<label>Admission No</label>

<input
type="text"
id="admissionNo"
required>

</div>

<div>

<label>Name</label>

<input
type="text"
id="name"
required>

</div>

<div>

<label>Class</label>

<input
type="text"
id="studentClass"
required>

</div>

<div>

<label>Section</label>

<input
type="text"
id="section"
required>

</div>

<div>

<label>Email</label>

<input
type="email"
id="email"
required>

</div>

</div>

<br>

<button type="submit" class="save-btn">

<i class="fas fa-save"></i>

Update Student

</button>

<a href="students.html" class="cancel-btn">

Cancel

</a>

</form>

</div>

<script type="module" src="edit-student.js"></script>

</body>

</html>
